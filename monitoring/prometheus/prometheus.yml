global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "tavok-web"
    metrics_path: /api/metrics
    static_configs:
      - targets: ["web:5555"]
    # Pass internal secret for metrics endpoint auth.
    # WARNING: Prometheus does NOT support ${VAR} shell expansion in YAML.
    # For production, generate this file via envsubst or replace the value below:
    #   envsubst < monitoring/prometheus/prometheus.yml.tmpl > monitoring/prometheus/prometheus.yml
    headers:
      x-internal-secret: "dev-internal-secret"

  - job_name: "tavok-gateway"
    metrics_path: /api/metrics
    static_configs:
      - targets: ["gateway:4001"]

  - job_name: "tavok-streaming"
    metrics_path: /metrics
    static_configs:
      - targets: ["streaming:4002"]
