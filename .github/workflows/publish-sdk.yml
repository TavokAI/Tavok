name: Publish Python SDK

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Package index to publish to
        required: true
        default: pypi
        type: choice
        options:
          - pypi
          - testpypi

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Build and Verify SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build
        working-directory: sdk/python

      - name: Install built wheel
        shell: bash
        working-directory: sdk/python
        run: |
          python -m venv .venv-install
          source .venv-install/bin/activate
          pip install dist/*.whl
          python -c "import tavok; print(tavok.__version__)"

  publish-pypi:
    name: Publish to PyPI
    needs: verify
    if: ${{ github.event.inputs.repository == 'pypi' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build
        working-directory: sdk/python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: verify
    if: ${{ github.event.inputs.repository == 'testpypi' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build
        working-directory: sdk/python

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          repository-url: https://test.pypi.org/legacy/
